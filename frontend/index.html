<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAgent - AI Code Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1 class="logo-text">CodeAgent</h1>
                </div>
                <div class="health-status" id="healthStatus">
                    <div class="status-dot"></div>
                    <span class="status-text">连接中...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h2 class="sidebar-title">项目文件夹</h2>
                    <button class="btn-primary btn-full" id="addRepoBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        添加文件夹
                    </button>
                    <div class="repo-list" id="repoList">
                        <div class="empty-state">暂无项目</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h2 class="sidebar-title">对话历史</h2>
                    <div class="session-list" id="sessionList">
                        <div class="empty-state">暂无对话</div>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <section class="chat-section">
                <div class="chat-header">
                    <div class="chat-title">
                        <h2 id="currentRepoName">Select a Repository</h2>
                        <span class="chat-subtitle" id="currentRepoPath"></span>
                    </div>
                    <button class="btn-icon" id="clearChatBtn" title="Clear chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
                                <path d="M2 17L12 22L22 17"/>
                                <path d="M2 12L12 17L22 12"/>
                            </svg>
                        </div>
                        <h3>欢迎使用 CodeAgent</h3>
                        <p>添加本地文件夹，开始提问您的代码问题</p>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea
                            class="chat-input"
                            id="chatInput"
                            placeholder="Ask a question about your code..."
                            rows="1"
                        ></textarea>
                        <button class="btn-send" id="sendBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Repository Modal -->
    <div class="modal-overlay" id="addRepoModal">
        <div class="modal">
            <div class="modal-header">
                <h3>添加本地文件夹</h3>
                <button class="btn-icon" id="closeModalBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form class="modal-body" id="addRepoForm">
                <div class="form-group">
                    <label for="repoName">项目名称</label>
                    <input
                        type="text"
                        id="repoName"
                        name="name"
                        placeholder="例如: 我的代码库"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="repoPath">文件夹路径</label>
                    <input
                        type="text"
                        id="repoPath"
                        name="path"
                        placeholder="D:\code\my-project 或 /home/user/project"
                        required
                    >
                    <small class="form-hint">支持本地任意文件夹的绝对路径</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 13l4 4L19 7"/>
                        </svg>
                        添加
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
